name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (e.g., v1.0.0)"
        required: true
        type: string
      title:
        description: "Title (defaults to tag)"
        required: false
        type: string
      summary:
        description: "Summary (appears above auto-generated notes)"
        required: false
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - run: npm ci

      - name: Generate
        run: npm run generate

      - name: Test
        run: npm run test

      - name: Create Draft Release
        run: |
          RELEASE_TITLE="$INPUT_TITLE"
          if [ -z "$RELEASE_TITLE" ]; then RELEASE_TITLE="$INPUT_TAG"; fi

          RELEASE_ARGS=()
          if [ "$INPUT_PRERELEASE" = "true" ]; then RELEASE_ARGS+=("--prerelease"); fi

          if [ -n "$INPUT_SUMMARY" ]; then
            printf '%s' "$INPUT_SUMMARY" > summary.md
            RELEASE_ARGS+=("--notes-file" "summary.md")
          fi

          gh release create "$INPUT_TAG" \
            --title "$RELEASE_TITLE" \
            --draft \
            "${RELEASE_ARGS[@]}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_TITLE: ${{ inputs.title }}
          INPUT_SUMMARY: ${{ inputs.summary }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
