# Generates and commits package-lock.json so `npm ci` works. Without a
# checked-in lockfile, `npm ci` fails with EUSAGE.
name: Update package-lock.json
run-name: Update package-lock.json (${{ github.event_name }})

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - package.json

concurrency:
  group: lockfile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lockfile:
    name: Generate & commit package-lock.json
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Generate package-lock.json
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit package-lock.json if it changed
        uses: EndBug/add-and-commit@0a145b91207725ab63102736ff2ddcf18f90cdb5 # v10.0.0
        with:
          add: package-lock.json
          message: "ci: Update package-lock.json"
